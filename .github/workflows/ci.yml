name: CI

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version consistency
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "Source of truth: manifest.json=$VERSION"

          PKG=$(jq -r '.version' package.json)
          SRV=$(jq -r '.version' server.json)
          SRV_PKG=$(jq -r '.packages[0].version' server.json)
          CONSTANTS=$(sed -n 's/export const VERSION = "\(.*\)";/\1/p' src/constants.ts)

          FAIL=0
          [ "$PKG" != "$VERSION" ]       && echo "MISMATCH: package.json=$PKG"               && FAIL=1
          [ "$SRV" != "$VERSION" ]       && echo "MISMATCH: server.json (top)=$SRV"           && FAIL=1
          [ "$SRV_PKG" != "$VERSION" ]   && echo "MISMATCH: server.json packages[0]=$SRV_PKG" && FAIL=1
          [ "$CONSTANTS" != "$VERSION" ] && echo "MISMATCH: src/constants.ts=$CONSTANTS"      && FAIL=1

          [ $FAIL -eq 0 ] && echo "OK: all versions match $VERSION"
          exit $FAIL

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

  bundle:
    runs-on: ubuntu-latest
    needs: [version-check, lint, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install and build
        run: npm ci && npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Test bundle creation
        run: |
          npx @anthropic-ai/mcpb pack
          ls -la *.mcpb
